<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification | Cleonix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #059669;
            --error-color: #dc2626;
            --text-dark: #1f2937;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 20px 48px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        #result-card {
            background: #fdfdfd;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #f1f5f9;
            text-align: left;
            transition: all 0.3s ease;
        }

        .data-row {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .label {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .value {
            font-weight: 600;
            color: var(--text-dark);
        }

        .status-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-valid {
            background: #dcfce7;
            color: var(--success-color);
        }

        .status-invalid {
            background: #fee2e2;
            color: var(--error-color);
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">Cleonix</div>
    <h2>Official Certificate Verification</h2>

    <div id="display-area">
        <div class="loading-spinner"></div>
        <p>Verifying Credentials...</p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const certId = params.get("id");
    const displayArea = document.getElementById("display-area");

    // Simulate slight delay for professional feel
    setTimeout(() => {
        fetch("certificates.json")
            .then(response => response.json())
            .then(data => {
                const cert = data.find(c => c.id === certId);
                if(cert) {
                    displayArea.innerHTML = `
                        <div id="result-card">
                            <div class="data-row">
                                <span class="label">Name</span>
                                <span class="value">${cert.name}</span>
                            </div>
                            <div class="data-row">
                                <span class="label">Role</span>
                                <span class="value">${cert.role}</span>
                            </div>
                            <div class="data-row" style="border:none">
                                <span class="label">Duration</span>
                                <span class="value">${cert.duration}</span>
                            </div>
                            <div style="text-align:center">
                                <span class="status-badge status-valid">✓ VERIFIED AUTHENTIC</span>
                            </div>
                        </div>
                    `;
                } else {
                    displayArea.innerHTML = `
                        <div style="padding: 20px;">
                            <span class="status-badge status-invalid">Invalid Certificate ID</span>
                            <p style="color:#64748b; font-size: 0.9rem; margin-top: 15px;">
                                This ID does not match any records in our database.
                            </p>
                        </div>
                    `;
                }
            })
            .catch(err => {
                displayArea.innerHTML = "Error connecting to verification server.";
            });
    }, 800);
</script>

</body>
</html>
