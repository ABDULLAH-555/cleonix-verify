<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification | Cleonix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-blue: #0B1C2D;
            --success-color: #059669;
            --error-color: #dc2626;
            --linkedin-blue: #0077b5;
            --bg-gradient: linear-gradient(135deg, #0B1C2D, #123B5A);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .header-info { margin-bottom: 20px; text-align: center; }
        .header-info h1 { margin: 0; letter-spacing: 2px; }
        .header-info p { opacity: 0.8; font-weight: 300; margin-top: 5px; }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
            color: #1f2937;
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        h2 { font-size: 1rem; color: #64748b; margin-bottom: 1.5rem; font-weight: 400; }

        input {
            padding: 12px;
            width: 80%;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .btn-verify { background: #00E676; color: #0B1C2D; }
        .btn-verify:hover { background: #00c95f; transform: translateY(-2px); }

        .btn-linkedin { 
            background: var(--linkedin-blue); 
            color: white; 
            font-size: 0.85rem; 
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-linkedin:hover { background: #005a87; }

        #display-area { margin-top: 25px; text-align: left; }

        .result-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #edf2f7;
        }

        .label { color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .value { font-weight: 600; font-size: 0.95rem; }

        .status-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .status-valid { background: #dcfce7; color: var(--success-color); }
        .status-invalid { background: #fee2e2; color: var(--error-color); }

        .footer { margin-top: 30px; font-size: 12px; opacity: 0.6; }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header-info">
    <h1>CLEONIX</h1>
    <p>AI & Sustainable Energy Systems</p>
</div>

<div class="container">
    <div class="logo-area">Cleonix</div>
    <h2>Certificate Verification Portal</h2>

    <input type="text" id="certInput" placeholder="Enter Certificate ID">
    <button class="btn btn-verify" onclick="handleManualVerify()">Verify Now</button>

    <div id="display-area"></div>
</div>

<div class="footer">
    Verified Digital Credential | Cleonix Official Portal
</div>

<script>
    const displayArea = document.getElementById("display-area");

    function performVerification(certId) {
        if(!certId) return;
        
        displayArea.innerHTML = '<div class="loading-spinner"></div><p style="text-align:center">Checking Records...</p>';

        fetch("certificates.json")
            .then(res => res.json())
            .then(data => {
                const cert = data.find(c => c.id.trim() === certId.trim());
                
                if(cert) {
                    // LinkedIn Direct Add Link
                    const baseUrl = "https://www.linkedin.com/profile/add";
                    const params = new URLSearchParams({
                        startTask: "CERTIFICATION_NAME",
                        name: cert.role + " - Cleonix",
                        organizationName: "Cleonix",
                        certId: cert.id,
                        certUrl: window.location.href,
                        issueYear: "2026",
                        issueMonth: "3"
                    });
                    const linkedinUrl = `${baseUrl}?${params.toString()}`;

                    displayArea.innerHTML = `
                        <div class="result-card">
                            <div class="data-row"><span class="label">Name</span><span class="value">${cert.name}</span></div>
                            <div class="data-row"><span class="label">Role</span><span class="value">${cert.role}</span></div>
                            <div class="data-row" style="border:none"><span class="label">Duration</span><span class="value">${cert.duration}</span></div>
                            <div style="text-align:center">
                                <span class="status-badge status-valid">✓ VERIFIED AUTHENTIC</span>
                                <br>
                                <a href="${linkedinUrl}" target="_blank" style="display: block; background: #0077b5; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px;">
                                    + Add to LinkedIn Profile
                                </a>
                            </div>
                        </div>`;
                } else {
                    displayArea.innerHTML = `
                        <div class="result-card" style="text-align:center">
                            <span class="status-badge status-invalid">Invalid ID</span>
                            <p style="font-size: 0.85rem; color: #64748b; margin-top:10px;">No record found for: <b>${certId}</b></p>
                        </div>`;
                }
            })
            .catch(err => {
                displayArea.innerHTML = "<p style='color:red; text-align:center;'>Error loading database. Make sure certificates.json is in the repo.</p>";
            });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const autoId = urlParams.get("id");
    if(autoId) {
        document.getElementById("certInput").value = autoId;
        performVerification(autoId);
    }

    function handleManualVerify() {
        const inputVal = document.getElementById("certInput").value;
        performVerification(inputVal);
    }
</script>

</body>
</html>
