<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleonix Certificate Verification</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0B1C2D, #123B5A);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: white;
    color: #0B1C2D;
    max-width: 500px;
    margin: auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    margin-bottom: 10px;
}

input {
    padding: 10px;
    width: 80%;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #00E676;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00c95f;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
}

.valid {
    background: #d4edda;
    color: #155724;
}

.invalid {
    background: #f8d7da;
    color: #721c24;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Cleonix</h1>
<p>AI & Sustainable Energy Systems</p>

<div class="container">
    <h2>Certificate Verification Portal</h2>

    <input type="text" id="certInput" placeholder="Enter Certificate ID">
    <br>
    <button onclick="verifyCertificate()">Verify</button>

    <div id="resultBox"></div>
</div>

<div class="footer">
Verified Digital Credential | Cleonix
</div>

<script>

const params = new URLSearchParams(window.location.search);
const autoID = params.get("id");

if(autoID){
    document.getElementById("certInput").value = autoID;
    verifyCertificate();
}

function verifyCertificate() {

    const certId = document.getElementById("certInput").value.trim();
    const resultBox = document.getElementById("resultBox");

    fetch("certificates.json")
        .then(response => response.json())
        .then(data => {

            const cert = data.find(c => c.id === certId);

            if(cert){
                resultBox.innerHTML = `
                <div class="result valid">
                    <h3>✅ Certificate Valid</h3>
                    <p><strong>Name:</strong> ${cert.name}</p>
                    <p><strong>Role:</strong> ${cert.role}</p>
                    <p><strong>Duration:</strong> ${cert.duration}</p>
                    <p><strong>ID:</strong> ${cert.id}</p>
                </div>`;
            } else {
                resultBox.innerHTML = `
                <div class="result invalid">
                    <h3>❌ Invalid Certificate ID</h3>
                    <p>No record found in Cleonix database.</p>
                </div>`;
            }
        });
}
</script>

</body>
</html>
